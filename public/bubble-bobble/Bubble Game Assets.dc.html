<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #F6F4EE; }
</style>
</helmet>
<div style="min-height:100vh; padding:48px; font-family: Helvetica, Arial, sans-serif; box-sizing:border-box;">
  <h1 style="font-size:28px; margin:0 0 4px; color:#222;">Bubble Game Asset Pack</h1>
  <p style="color:#666; margin:0 0 32px; font-size:14px;">Transparent PNGs, hand-drawn playful style. Face slots are flat grey circles for photo compositing.</p>
  <sc-for list="{{ groups }}" as="group" hint-placeholder-count="5">
    <div style="margin-bottom:36px;">
      <h2 style="font-size:16px; color:#333; margin:0 0 12px; text-transform:uppercase; letter-spacing:0.04em;">{{ group.title }}</h2>
      <div style="display:flex; flex-wrap:wrap; gap:20px;">
        <sc-for list="{{ group.items }}" as="item" hint-placeholder-count="3">
          <div style="display:flex; flex-direction:column; align-items:center; gap:8px; background:#fff; border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.08); width:180px;">
            <div style="width:150px; height:150px; display:flex; align-items:center; justify-content:center; background:repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 0 0/16px 16px; border-radius:10px;">
              <img src="{{ item.src }}" style="max-width:100%; max-height:100%; object-fit:contain;" alt="{{ item.name }}" />
            </div>
            <div style="font-size:12px; color:#555; text-align:center; word-break:break-all;">{{ item.name }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const groups = [
      { title: 'Player (dragon)', items: [
        { name: 'player-idle.png', src: './assets/player-idle.png' },
        { name: 'player-walk.png', src: './assets/player-walk.png' },
        { name: 'player-jump.png', src: './assets/player-jump.png' },
        { name: 'player-blow.png', src: './assets/player-blow.png' },
      ]},
      { title: 'Bubbles', items: [
        { name: 'bubble-empty.png', src: './assets/bubble-empty.png' },
        { name: 'bubble-trapped.png', src: './assets/bubble-trapped.png' },
      ]},
      { title: 'Enemies (face slot = grey circle)', items: [
        { name: 'enemy-type1.png', src: './assets/enemy-type1.png' },
        { name: 'enemy-type2.png', src: './assets/enemy-type2.png' },
      ]},
      { title: 'Platform', items: [
        { name: 'platform-tile.png', src: './assets/platform-tile.png' },
      ]},
      { title: 'Backgrounds (10 levels)', items: [
        { name: 'bg-cave.png', src: './assets/bg-cave.png' },
        { name: 'bg-cave-deep.png', src: './assets/bg-cave-deep.png' },
        { name: 'bg-cave-forest.png', src: './assets/bg-cave-forest.png' },
        { name: 'bg-cave-ice.png', src: './assets/bg-cave-ice.png' },
        { name: 'bg-cave-lava.png', src: './assets/bg-cave-lava.png' },
        { name: 'bg-cave-crystal.png', src: './assets/bg-cave-crystal.png' },
        { name: 'bg-cave-swamp.png', src: './assets/bg-cave-swamp.png' },
        { name: 'bg-cave-sunset.png', src: './assets/bg-cave-sunset.png' },
        { name: 'bg-cave-storm.png', src: './assets/bg-cave-storm.png' },
        { name: 'bg-cave-gold.png', src: './assets/bg-cave-gold.png' },
      ]},
    ];
    return { groups };
  }
}

</script>
</body>
</html>
